<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Simpson Health</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Bebas+Neue&display=swap');
  :root {
    --bg:#0a0a0f; --card:#13131c; --card2:#1a1a26;
    --accent:#00e5ff; --green:#00ff88; --red:#ff4466;
    --orange:#ff8c00; --purple:#b47fff; --yellow:#ffcc00;
    --text:#eeeeff; --muted:#666688; --border:#22223a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;padding:0 0 64px;-webkit-tap-highlight-color:transparent;}

  /* NAV */
  .nav{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 8px;}
  .nav::-webkit-scrollbar{display:none;}
  .nav-btn{flex-shrink:0;padding:13px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s;}
  .nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

  .page{display:none;padding:0 0 20px;}
  .page.active{display:block;}
  .section{padding:16px 16px 0;}
  .section-title{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
  .spacer{height:16px;}

  /* CARDS */
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
  .card-title{font-size:11px;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
  .big-num{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:1px;line-height:1;}
  .big-unit{font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--muted);}
  .change{font-size:12px;font-weight:700;margin-top:4px;}
  .up{color:var(--red);} .down-good{color:var(--green);} .down-bad{color:var(--red);}

  /* GOAL BAR */
  .goal-bar-bg{height:8px;background:var(--border);border-radius:8px;overflow:hidden;margin:8px 0 4px;}
  .goal-bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--accent),var(--green));}
  .goal-sub{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}

  /* GRID */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .mini-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;}
  .mini-label{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:2px;}
  .mini-val{font-family:'Bebas Neue',sans-serif;font-size:24px;line-height:1;}
  .mini-unit{font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--muted);}
  .mini-change{font-size:11px;font-weight:700;margin-top:3px;}

  /* ALERT */
  .alert{border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:13px;line-height:1.6;}
  .alert-warn{background:rgba(255,68,102,0.08);border:1px solid rgba(255,68,102,0.25);color:#ccc;}
  .alert-warn strong{color:var(--red);}
  .alert-ok{background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.2);color:#ccc;}
  .alert-ok strong{color:var(--green);}
  .alert-title{font-weight:700;margin-bottom:4px;}

  /* CHART */
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
  .ch-title{font-size:12px;font-weight:700;margin-bottom:2px;}
  .ch-sub{font-size:11px;color:var(--muted);margin-bottom:12px;}
  .chart-wrap{position:relative;height:200px;}

  /* DIET */
  .date-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px;}
  .date-nav button{background:var(--card2);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .date-nav .date-text{font-size:14px;font-weight:700;min-width:140px;text-align:center;}
  .date-nav .today-badge{font-size:10px;background:rgba(0,229,255,0.12);color:var(--accent);padding:2px 8px;border-radius:10px;margin-left:6px;}

  .protein-bar{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;}
  .protein-bar canvas{width:64px;height:64px;flex-shrink:0;}
  .pb-info .pb-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--accent);line-height:1;}
  .pb-info .pb-sub{font-size:11px;color:var(--muted);margin-top:2px;}
  .pb-info .pb-warn{font-size:11px;color:var(--red);font-weight:700;margin-top:2px;}
  .pb-info .pb-ok{font-size:11px;color:var(--green);font-weight:700;margin-top:2px;}

  .summary-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
  .summary-chip{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--card2);border:1px solid var(--border);}

  .meal-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
  .meal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .meal-type{font-size:12px;font-weight:700;color:var(--accent);}
  .meal-time{font-size:11px;color:var(--muted);}
  .meal-name{font-size:13px;font-weight:700;margin-bottom:6px;}
  .meal-nutrients{display:flex;gap:6px;flex-wrap:wrap;}
  .nutrient-chip{font-size:10px;padding:2px 8px;border-radius:20px;background:var(--card2);}
  .nutrient-chip.cal{color:var(--yellow);}
  .nutrient-chip.pro{color:var(--accent);}
  .nutrient-chip.carb{color:var(--orange);}
  .nutrient-chip.fat{color:var(--purple);}
  .meal-skip{font-size:12px;color:var(--muted);font-style:italic;}
  .meal-photo{width:100%;border-radius:8px;margin-bottom:8px;cursor:pointer;}

  /* PHOTO OVERLAY */
  .photo-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:999;align-items:center;justify-content:center;}
  .photo-overlay.show{display:flex;}
  .photo-overlay img{max-width:95%;max-height:90%;object-fit:contain;}

  /* TIMELINE */
  .tl{position:relative;padding-left:18px;}
  .tl::before{content:'';position:absolute;left:4px;top:6px;bottom:6px;width:1px;background:var(--border);}
  .tl-item{position:relative;padding:0 0 16px 14px;}
  .tl-item::before{content:'';position:absolute;left:-5px;top:5px;width:9px;height:9px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);}
  .tl-item.latest::before{background:var(--green);box-shadow:0 0 6px var(--green);}
  .tl-date{font-size:11px;color:var(--muted);margin-bottom:2px;}
  .tl-val{font-family:'Bebas Neue',sans-serif;font-size:22px;line-height:1;}
  .tl-detail{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.5;}
  .tl-tag{display:inline-block;border-radius:20px;padding:2px 8px;font-size:10px;margin-top:3px;}

  /* EXERCISE */
  .ex-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
  .ex-type{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;}
  .ex-name{font-size:13px;font-weight:700;}
  .ex-detail{font-size:12px;color:var(--muted);margin-top:2px;}

  /* CAMERA */
  .cam-btn{position:fixed;bottom:74px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;font-size:22px;cursor:pointer;z-index:101;box-shadow:0 4px 16px rgba(0,229,255,0.3);display:flex;align-items:center;justify-content:center;transition:transform 0.15s;}
  .cam-btn:active{transform:scale(0.9);}
  .cam-input{display:none;}
  .upload-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;z-index:200;display:none;}

  /* BOTTOM NAV */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
  .bottom-nav a{flex:1;text-align:center;padding:10px 0 8px;font-size:10px;color:var(--muted);text-decoration:none;}
  .bottom-nav a.active{color:var(--accent);}
  .bottom-nav a .icon{font-size:18px;display:block;margin-bottom:1px;}

  /* CALENDAR */
  .cal-header{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px;}
  .cal-header button{background:var(--card2);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;color:var(--accent);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .cal-header .cal-month{font-size:15px;font-weight:700;min-width:120px;text-align:center;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .cal-dow{text-align:center;font-size:10px;color:var(--muted);padding:6px 0;}
  .cal-dow.sun{color:var(--red);}
  .cal-day{text-align:center;padding:8px 2px;border-radius:8px;font-size:12px;position:relative;min-height:40px;cursor:pointer;}
  .cal-day.today{background:rgba(0,229,255,0.12);color:var(--accent);font-weight:700;}
  .cal-day.other{color:var(--border);}
  .cal-day.sun{color:var(--red);}
  .cal-day .cal-dots{display:flex;gap:2px;justify-content:center;margin-top:2px;}
  .cal-day .cal-dot{width:5px;height:5px;border-radius:50%;}
  .cal-dot.medication{background:var(--purple);}
  .cal-dot.inbody{background:var(--accent);}
  .cal-dot.hospital{background:var(--red);}
  .cal-dot.diet{background:var(--green);}
  .cal-dot.exercise{background:var(--orange);}
  .cal-events{margin-top:12px;}
  .cal-event{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;font-size:12px;}
  .cal-event .ev-date{color:var(--muted);font-size:11px;}

  .loading{text-align:center;padding:40px;color:var(--muted);}
  .empty{text-align:center;padding:20px;color:var(--muted);font-size:13px;}
</style>
</head>
<body>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('home',this)">홈</button>
  <button class="nav-btn" onclick="showPage('diet',this)">식단</button>
  <button class="nav-btn" onclick="showPage('weight',this)">체중</button>
  <button class="nav-btn" onclick="showPage('exercise',this)">운동</button>
  <button class="nav-btn" onclick="showPage('calendar',this)">달력</button>
  <button class="nav-btn" onclick="showPage('history',this)">기록</button>
</nav>

<div class="page active" id="page-home"><div class="loading">로딩 중...</div></div>
<div class="page" id="page-diet"><div class="loading">로딩 중...</div></div>
<div class="page" id="page-weight"><div class="loading">로딩 중...</div></div>
<div class="page" id="page-exercise"><div class="loading">로딩 중...</div></div>
<div class="page" id="page-calendar"><div class="loading">로딩 중...</div></div>
<div class="page" id="page-history"><div class="loading">로딩 중...</div></div>

<div class="photo-overlay" id="photoOverlay" onclick="this.classList.remove('show')">
  <img id="photoOverlayImg" src="">
</div>

<button class="cam-btn" onclick="document.getElementById('camInput').click()">📷</button>
<button class="cam-btn" style="bottom:134px;background:var(--purple);box-shadow:0 4px 16px rgba(180,127,255,0.3);font-size:18px;" onclick="document.getElementById('fileInput').click()">📁</button>
<input type="file" id="camInput" class="cam-input" accept="image/*" capture="environment" onchange="uploadPhoto(this)">
<input type="file" id="fileInput" class="cam-input" accept="image/*,.csv,.txt,.xlsx" onchange="uploadPhoto(this)">
<div class="upload-toast" id="uploadToast"></div>

<div class="bottom-nav">
  <a href="/" class="active"><span class="icon">📊</span>대시보드</a>
  <a href="/guide.html"><span class="icon">📖</span>가이드</a>
  <a href="/foods.html"><span class="icon">🍽️</span>음식관리</a>
</div>

<script>
let DATA = null;
let dietDate = new Date().toISOString().slice(0,10);
let exDate = new Date().toISOString().slice(0,10);
const gc='#22223a', tc='#666688';

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
}

function showPhoto(src){
  document.getElementById('photoOverlayImg').src=src;
  document.getElementById('photoOverlay').classList.add('show');
}

function daysSince(dateStr){
  return Math.floor((new Date()-new Date(dateStr))/86400000)+1;
}

function fmtDate(d){
  const dt=new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}

function fmtDateFull(d){
  const dt=new Date(d);
  const today=new Date().toISOString().slice(0,10);
  const label = d===today?' (오늘)':'';
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}${label}`;
}

function changeHtml(val,unit,goodDir){
  if(val===null||val===undefined) return '';
  const arrow=val<0?'▼':val>0?'▲':'';
  let cls='';
  if(goodDir==='down') cls=val<0?'down-good':'up';
  else if(goodDir==='up') cls=val>0?'down-good':'down-bad';
  else cls=val<0?'down-bad':'up';
  return `<div class="mini-change ${cls}">${arrow} ${Math.abs(val).toFixed(1)}${unit}</div>`;
}

// ===== 홈 =====
function renderHome(data){
  const p=data.profile;
  const wr=data.weight_records||[];
  const latest=wr.length?wr[wr.length-1]:null;
  const prev=wr.length>1?wr[wr.length-2]:null;
  const wChange=latest&&prev?(latest.weight_kg-prev.weight_kg):null;
  // 전일 vs 전 측정 판별
  let wChangeLabel='';
  if(latest&&prev){
    const diffDays=Math.floor((new Date(latest.date)-new Date(prev.date))/86400000);
    wChangeLabel=diffDays===1?'전일 대비':`${diffDays}일 전 대비`;
  }
  const totalLoss=latest?(p.start_weight_kg-latest.weight_kg):0;
  const totalGoal=p.start_weight_kg-p.goal_weight_kg;
  const pct=totalGoal>0?((totalLoss/totalGoal)*100).toFixed(1):0;
  const remaining=latest?(latest.weight_kg-p.goal_weight_kg).toFixed(1):'?';
  const days=daysSince(p.medication_start);

  // 오늘 식단
  const today=new Date().toISOString().slice(0,10);
  const todayMeals=data.diet_records.filter(r=>r.date===today);
  let tPro=0,tCal=0;
  todayMeals.forEach(m=>{tPro+=m.protein_g;tCal+=m.calories_kcal;});
  const proTarget=(p.daily_targets||{}).protein_g||110;

  // 최근 운동
  const exRecs=data.exercise_records||[];
  const lastEx=exRecs.length?exRecs[exRecs.length-1]:null;

  // 인바디 경고
  const inbody=data.inbody_records;
  const latestInbody=inbody[inbody.length-1];
  const mc=latestInbody?latestInbody.muscle_change_kg:null;

  let alertHtml='';
  if(mc!==null&&mc<-1){
    alertHtml+=`<div class="alert alert-warn"><div class="alert-title">⚠️ 근손실 경고</div>근육 ${mc}kg 감소. 단백질 ${proTarget}g 이상 필수!</div>`;
  }
  if(tPro<proTarget&&todayMeals.length>0){
    alertHtml+=`<div class="alert alert-warn"><div class="alert-title">⚠️ 단백질 부족</div>오늘 ${tPro}g / ${proTarget}g (${(proTarget-tPro).toFixed(0)}g 부족)</div>`;
  }

  // 식단 요약
  const mealIcons={아침:'🌅',점심:'☀️',저녁:'🌙',간식:'🍪',음료:'☕',보충제:'💊'};
  let dietSummary='';
  if(todayMeals.length===0){
    dietSummary='<div class="empty">오늘 식단 미기록</div>';
  } else {
    todayMeals.forEach(m=>{
      if(m.calories_kcal===0&&m.food_name.includes('굶')) return;
      dietSummary+=`<div style="font-size:12px;padding:3px 0;color:#ccc;">${mealIcons[m.meal_type]||'🍽️'} ${m.meal_type}: ${m.food_name} ${m.quantity?'('+m.quantity+')':''} <span style="color:var(--accent)">${m.protein_g}g P</span></div>`;
    });
  }

  document.getElementById('page-home').innerHTML=`
    <div class="section">
      <div class="spacer"></div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div class="card-title">현재 체중</div>
            <div class="big-num">${latest?latest.weight_kg:'--'}<span class="big-unit">kg</span></div>
            ${wChange!==null?`<div class="change ${wChange<=0?'down-good':'up'}">${wChange<0?'▼':'▲'} ${Math.abs(wChange).toFixed(1)}kg (${wChangeLabel})</div>`:''}
          </div>
          <div style="text-align:right;">
            <div style="font-size:11px;color:var(--muted);">💊 마운자로 ${latestInbody?'':''}D+${days}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;">${(data.medication_records[data.medication_records.length-1]||{}).dose||''}</div>
          </div>
        </div>
      </div>

      <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${pct}%"></div></div>
      <div class="goal-sub"><span>${p.start_weight_kg}kg</span><span style="color:var(--accent)">${pct}% 달성</span><span>${p.goal_weight_kg}kg 목표</span></div>
      <div style="display:flex;justify-content:center;gap:16px;font-size:11px;margin-top:4px;"><span style="color:var(--green);">▼${totalLoss.toFixed(1)}kg 감량</span><span style="color:var(--muted);">${remaining}kg 남음</span></div>

      <div class="spacer"></div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <div class="card-title" style="margin:0;">오늘 단백질</div>
          <div style="font-size:13px;font-weight:700;color:${tPro/proTarget<0.3?'var(--red)':tPro/proTarget<0.7?'var(--orange)':'var(--green)'};">${tPro}g / ${proTarget}g</div>
        </div>
        <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${Math.min(100,tPro/proTarget*100)}%;background:${tPro/proTarget<0.3?'var(--red)':tPro/proTarget<0.7?'linear-gradient(90deg,var(--orange),var(--yellow))':'linear-gradient(90deg,var(--green),var(--accent))'}"></div></div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;">${tPro>=proTarget?'✅ 목표 달성!':'⚠️ '+(proTarget-tPro).toFixed(0)+'g 부족 — 쉐이크 1잔 = +36g'} · ${tCal}kcal</div>
      </div>

      ${alertHtml}

      <div class="card">
        <div class="card-title">오늘 식단</div>
        ${dietSummary}
      </div>

      <div class="card">
        <div class="card-title">최근 운동</div>
        ${lastEx?`<div style="font-size:12px;color:#ccc;">${lastEx.date} — ${lastEx.exercises.map(e=>e.name).join(', ')}</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">~${lastEx.total_calories_burned||'?'}kcal 소모</div>`:'<div class="empty">운동 기록 없음</div>'}
      </div>
    </div>`;
}

// ===== 식단 =====
function renderDiet(data){
  const meals=data.diet_records.filter(r=>r.date===dietDate);
  const target=(data.profile.daily_targets||{}).protein_g||110;
  let tCal=0,tPro=0,tCarb=0,tFat=0;
  meals.forEach(m=>{tCal+=m.calories_kcal;tPro+=m.protein_g;tCarb+=m.carbs_g;tFat+=m.fat_g;});
  const proShort=target-tPro;

  const mealIcons={아침:'🌅',점심:'☀️',저녁:'🌙',간식:'🍪',음료:'☕',보충제:'💊'};
  const mealOrder=['아침','점심','저녁','간식','음료','보충제'];
  let mealsHtml='';
  mealOrder.forEach(type=>{
    const ms=meals.filter(m=>m.meal_type===type);
    if(ms.length===0&&['아침','점심','저녁'].includes(type)){
      mealsHtml+=`<div class="meal-card"><div class="meal-header"><div class="meal-type">${mealIcons[type]} ${type}</div></div><div class="meal-skip">미기록</div></div>`;
    }
    ms.forEach(m=>{
      const photo=m.photo&&typeof m.photo==='string'?`<img class="meal-photo" src="/${m.photo}" onclick="showPhoto('/${m.photo}')">`:'' ;
      const qty=m.quantity?' ('+m.quantity+')':'';
      if(m.calories_kcal===0&&m.food_name.includes('굶')){
        mealsHtml+=`<div class="meal-card"><div class="meal-header"><div class="meal-type">${mealIcons[type]||'🍽️'} ${type}</div></div>${photo}<div class="meal-skip">${m.food_name} ${m.memo?'('+m.memo+')':''}</div></div>`;
      } else {
        mealsHtml+=`<div class="meal-card"><div class="meal-header"><div class="meal-type">${mealIcons[type]||'🍽️'} ${type}</div><div class="meal-time">${m.time||''}</div></div>${photo}<div class="meal-name">${m.food_name}${qty}</div><div class="meal-nutrients"><span class="nutrient-chip cal">🔥${m.calories_kcal}</span><span class="nutrient-chip pro">P${m.protein_g}g</span><span class="nutrient-chip carb">C${m.carbs_g}g</span><span class="nutrient-chip fat">F${m.fat_g}g</span></div></div>`;
      }
    });
  });

  document.getElementById('page-diet').innerHTML=`
    <div class="section">
      <div class="spacer"></div>
      <div class="date-nav">
        <button onclick="moveDietDate(-1)">◀</button>
        <div class="date-text">${fmtDateFull(dietDate)}</div>
        <button onclick="moveDietDate(1)">▶</button>
      </div>
      <div class="protein-bar">
        <canvas id="proteinRing" width="64" height="64"></canvas>
        <div class="pb-info">
          <div class="pb-val">${tPro}<span style="font-size:14px;font-family:'Noto Sans KR'">g</span></div>
          <div class="pb-sub">목표 ${target}g</div>
          ${proShort>0?`<div class="pb-warn">⚠️ ${proShort.toFixed(0)}g 부족</div>`:`<div class="pb-ok">✅ 달성!</div>`}
        </div>
      </div>
      <div class="summary-row">
        <span class="summary-chip" style="color:var(--yellow)">🔥 ${tCal}kcal</span>
        <span class="summary-chip" style="color:var(--accent)">P ${tPro}g</span>
        <span class="summary-chip" style="color:var(--orange)">C ${tCarb}g</span>
        <span class="summary-chip" style="color:var(--purple)">F ${tFat}g</span>
      </div>
      ${meals.length===0?'<div class="empty">이 날 식단 기록 없음</div>':mealsHtml}
    </div>`;

  new Chart(document.getElementById('proteinRing'),{
    type:'doughnut',data:{datasets:[{data:[tPro,Math.max(0,target-tPro)],backgroundColor:['#00e5ff','#22223a'],borderWidth:0}]},
    options:{responsive:false,maintainAspectRatio:true,cutout:'70%',plugins:{legend:{display:false},tooltip:{enabled:false}}}
  });
}

function moveDietDate(dir){
  const d=new Date(dietDate);
  d.setDate(d.getDate()+dir);
  const today=new Date().toISOString().slice(0,10);
  if(d.toISOString().slice(0,10)>today) return;
  dietDate=d.toISOString().slice(0,10);
  renderDiet(DATA);
}

function renderWeight(data){
  const wr=data.weight_records||[];
  const ir=data.inbody_records||[];
  const p=data.profile;
  const latest=wr.length?wr[wr.length-1]:null;
  const latestInbody=ir.length?ir[ir.length-1]:null;

  // 인바디 — 차트에서 선택 시 해당 날짜만 표시 (기본: 최신)
  window._inbodyRecords=ir;

  document.getElementById('page-weight').innerHTML=`
    <div class="section">
      <div class="spacer"></div>
      <div class="card">
        <div class="card-title">현재 체중</div>
        <div class="big-num">${latest?latest.weight_kg:'--'}<span class="big-unit">kg</span></div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;">시작 ${p.start_weight_kg}kg 대비 <strong style="color:var(--green)">▼${latest?(p.start_weight_kg-latest.weight_kg).toFixed(1):'?'}kg</strong></div>
      </div>
      <div class="chart-card">
        <div class="ch-title">체중 변화</div>
        <div class="ch-sub">시작 ${p.start_weight_kg}kg → 현재 ${latest?latest.weight_kg:'?'}kg → 목표 ${p.goal_weight_kg}kg</div>
        <div class="chart-wrap" style="height:220px;"><canvas id="weightChart"></canvas></div>
      </div>
      ${ir.length>=2?`
      <div class="spacer"></div>
      <div class="section-title">체성분 변화</div>
      <div class="tab-bar" style="margin-bottom:10px;">
        <button class="tab-btn active" onclick="showBodyChart('fatpct',this)">체지방률</button>
        <button class="tab-btn" onclick="showBodyChart('composition',this)">근육vs지방</button>
        <button class="tab-btn" onclick="showBodyChart('bmi',this)">BMI</button>
        <button class="tab-btn" onclick="showBodyChart('bmr',this)">기초대사</button>
      </div>
      <div class="chart-card" id="bodyChart-fatpct">
        <div class="ch-title">체지방률 변화</div>
        <div class="ch-sub">${ir[0].fat_pct}% → ${ir[ir.length-1].fat_pct}% · 목표 25%</div>
        <div class="chart-wrap" style="height:200px;"><canvas id="fatpctChart"></canvas></div>
      </div>
      <div class="chart-card" id="bodyChart-composition" style="display:none">
        <div class="ch-title">골격근 vs 체지방</div>
        <div class="ch-sub">근육 유지 + 지방 감소가 핵심</div>
        <div class="chart-wrap" style="height:200px;"><canvas id="compositionChart"></canvas></div>
      </div>
      <div class="chart-card" id="bodyChart-bmi" style="display:none">
        <div class="ch-title">BMI 변화</div>
        <div class="ch-sub">정상: 18.5~24.9 · 비만: 30+</div>
        <div class="chart-wrap" style="height:200px;"><canvas id="bmiChart"></canvas></div>
      </div>
      <div class="chart-card" id="bodyChart-bmr" style="display:none">
        <div class="ch-title">기초대사량 변화</div>
        <div class="ch-sub">근육 유지하면 기초대사량도 유지</div>
        <div class="chart-wrap" style="height:200px;"><canvas id="bmrChart"></canvas></div>
      </div>
      `:''}
      <div class="spacer"></div>
      <div class="section-title">인바디 기록 <span style="font-size:10px;color:var(--accent);text-transform:none;letter-spacing:0;">(차트에서 🟡 포인트 탭하면 전환)</span></div>
      <div id="inbodyContainer"></div>
    </div>`;

  // 기본으로 최신 인바디 표시
  if(ir.length>0) showInbodyDetail(ir[ir.length-1].date);

  // 체성분 차트 렌더
  if(ir.length>=2) renderBodyCharts(ir);

  // 차트
  const wLabels=wr.map(r=>fmtDate(r.date));
  const wData=wr.map(r=>r.weight_kg);
  const irDates=new Set(ir.map(r=>r.date));

  // 인바디 측정일 포인트 (체중 데이터에서 인바디 날짜만)
  const inbodyPoints=wr.map(r=>irDates.has(r.date)?r.weight_kg:null);

  // 체중 포인트 색상 (인바디일 = 노란색 테두리)
  const pointBgColors=wr.map(r=>irDates.has(r.date)?'#ffcc00':'#00e5ff');
  const pointBorderColors=wr.map(r=>irDates.has(r.date)?'#ffcc00':'#00e5ff');
  const pointRadii=wr.map(r=>irDates.has(r.date)?7:4);

  // Y축 범위
  const wMin=Math.min(...wData);
  const wMax=Math.max(...wData);
  const yMin=Math.floor(wMin-3);
  const yMax=Math.ceil(wMax+2);

  // 7일 이동평균
  const maData=wData.map((_,i)=>{
    const vals=wData.slice(Math.max(0,i-6),i+1);
    return vals.length>=2?parseFloat((vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1)):null;
  });

  const weightChart=new Chart(document.getElementById('weightChart'),{
    type:'line',
    data:{labels:wLabels,datasets:[
      {label:'체중',data:wData,borderColor:'#00e5ff',backgroundColor:'rgba(0,229,255,0.06)',pointBackgroundColor:pointBgColors,pointBorderColor:pointBorderColors,pointRadius:pointRadii,pointHoverRadius:9,borderWidth:2,tension:0.3,fill:true},
      {label:'추세',data:maData,borderColor:'rgba(255,255,255,0.3)',borderWidth:1.5,borderDash:[4,3],pointRadius:0,tension:0.4,fill:false},
      {label:'목표',data:wLabels.map(()=>p.goal_weight_kg),borderColor:'rgba(255,68,102,0.3)',borderWidth:1,borderDash:[2,2],pointRadius:0,pointHitRadius:0,fill:false}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      onClick:(evt,elements)=>{
        if(elements.length>0&&elements[0].datasetIndex===0){
          const idx=elements[0].index;
          const date=wr[idx].date;
          if(irDates.has(date)){
            showInbodyDetail(date);
          }
        }
      },
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'#1a1a26',borderColor:'#22223a',borderWidth:1,titleColor:'#888',bodyColor:'#eee',bodyFont:{size:13,weight:'bold'},
          filter:item=>item.datasetIndex===0,
          callbacks:{
            label:ctx=>{
              const date=wr[ctx.dataIndex].date;
              const isInbody=irDates.has(date);
              return ctx.parsed.y+'kg'+(isInbody?' 📋 인바디 (탭하면 상세보기)':'');
            }
          }
        }
      },
      scales:{
        x:{ticks:{color:'#555',font:{size:10}},grid:{color:'rgba(255,255,255,0.03)'}},
        y:{min:yMin,max:yMax,ticks:{color:'#555',font:{size:10},callback:v=>v+'kg'},grid:{color:'rgba(255,255,255,0.05)'}}
      }
    }
  });
}

// ===== 운동 =====
let exGuideTab='machine';

function renderExercise(data){
  const allEx=data.exercise_records||[];
  const recs=allEx.filter(r=>r.date===exDate);

  // 주간 운동 현황
  const weekTarget=4;
  const now=new Date();
  const monday=new Date(now);monday.setDate(now.getDate()-((now.getDay()+6)%7));
  const mondayStr=monday.toISOString().slice(0,10);
  const weekExDates=new Set(allEx.filter(r=>r.date>=mondayStr).map(r=>r.date));
  const weekCount=weekExDates.size;
  const weekPct=Math.min(100,Math.round(weekCount/weekTarget*100));

  // 연속 쉰 일수
  let restDays=0;
  const todayStr=new Date().toISOString().slice(0,10);
  for(let i=0;i<30;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    if(allEx.find(r=>r.date===ds)) break;
    restDays++;
  }

  // 최근 운동
  const lastEx=allEx.length?allEx[allEx.length-1]:null;
  let lastExHtml='';
  if(lastEx&&lastEx.date!==exDate){
    const exNames=lastEx.exercises.map(e=>e.name).join(', ');
    lastExHtml='<div class="card"><div class="card-title">최근 운동 ('+lastEx.date+')</div><div style="font-size:12px;color:#ccc;">'+exNames+'</div>'+(lastEx.total_volume_kg?'<div style="font-size:11px;color:var(--accent);margin-top:4px;">볼륨 '+lastEx.total_volume_kg.toLocaleString()+'kg · ~'+lastEx.total_calories_burned+'kcal</div>':'')+'</div>';
  }

  // 오늘 기록 상세
  let exDetailHtml='';
  if(recs.length===0){
    exDetailHtml='<div class="empty">이 날 운동 기록 없음</div>';
  } else {
    recs.forEach(rec=>{
      rec.exercises.forEach(e=>{
        if(e.type==='cardio'){
          exDetailHtml+='<div class="card"><div style="font-size:12px;font-weight:700;">🏃 '+e.name+'</div><div style="font-size:12px;color:var(--muted);margin-top:4px;">'+(e.duration_min||'?')+'분 · 경사'+(e.incline_pct||'?')+'% · '+(e.speed_kmh||'?')+'km/h · ~'+(e.calories_burned||'?')+'kcal</div></div>';
        } else if(e.sets){
          const completed=e.sets.filter(s=>s.completed);
          const vol=completed.reduce((sum,s)=>sum+(s.kg||0)*(s.reps||0),0);
          const setsText=completed.map(s=>s.kg+'kg×'+s.reps).join(' / ');
          exDetailHtml+='<div class="card"><div style="font-size:12px;font-weight:700;">🏋️ '+e.name+'</div><div style="font-size:11px;color:var(--muted);margin-top:4px;">'+setsText+'</div><div style="font-size:11px;color:var(--accent);margin-top:2px;">볼륨 '+vol.toLocaleString()+'kg</div></div>';
        }
      });
      if(rec.total_volume_kg||rec.total_calories_burned){
        exDetailHtml+='<div style="text-align:center;font-size:12px;margin:8px 0;"><span style="color:var(--accent)">볼륨 '+(rec.total_volume_kg||0).toLocaleString()+'kg</span> · <span style="color:var(--orange)">~'+(rec.total_calories_burned||0)+'kcal</span> · <span style="color:var(--muted)">'+(rec.total_duration_min||'?')+'분</span></div>';
      }
      exDetailHtml+='<div style="display:flex;justify-content:center;gap:16px;margin-bottom:10px;"><a href="/workout-session.html?edit='+rec.date+'&start='+rec.start_time+'" style="font-size:12px;color:var(--accent);text-decoration:none;">✏️ 수정</a><a href="#" onclick="deleteExRecord(\''+rec.date+'\',\''+rec.start_time+'\');return false;" style="font-size:12px;color:var(--red);text-decoration:none;">🗑️ 삭제</a></div>';
    });
  }

  // 운동 가이드 카테고리별
  const lib=data.exercise_library||[];
  const groups={machine:[], bodyweight:[], cardio:[]};
  lib.forEach(ex=>{
    if(ex.type==='cardio') groups.cardio.push(ex);
    else if(['wall_pushup','bodyweight_squat','kettlebell_swing'].includes(ex.id)) groups.bodyweight.push(ex);
    else groups.machine.push(ex);
  });

  function renderGuideGroup(exercises){
    return exercises.map(ex=>{
      const icon=ex.type==='cardio'?'🏃':'🏋️';
      const prev=getExLastRecord(data,ex.id);
      let prevText='';
      if(prev&&prev.sets){
        const lastSet=prev.sets[prev.sets.length-1];
        prevText='<div style="font-size:11px;color:var(--accent);margin-top:4px;">최근: '+lastSet.kg+'kg × '+lastSet.reps+'회 × '+prev.sets.length+'세트</div>';
      } else if(prev&&prev.duration_min){
        prevText='<div style="font-size:11px;color:var(--accent);margin-top:4px;">최근: '+prev.duration_min+'분 경사'+(prev.incline_pct||0)+'%</div>';
      }
      return '<div class="card" style="cursor:pointer;" onclick="toggleExGuide(this)">'
        +'<div style="display:flex;align-items:center;gap:10px;">'
        +'<div style="font-size:18px;">'+icon+'</div>'
        +'<div style="flex:1;">'
        +'<div style="font-size:13px;font-weight:700;">'+ex.name+'</div>'
        +'<div style="font-size:11px;color:var(--muted);">'+ex.target.join(', ')+'</div>'
        +prevText
        +'</div>'
        +'<div style="font-size:14px;color:var(--muted);">▾</div>'
        +'</div>'
        +'<div class="ex-guide-body" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:#ccc;line-height:1.7;">'
        +'<a href="/workout.html#'+ex.id+'" style="color:var(--accent);font-size:11px;">자세 가이드 보기 →</a>'
        +'</div>'
        +'</div>';
    }).join('');
  }

  const restColor=restDays>=3?'var(--red)':restDays>=1?'var(--orange)':'var(--green)';
  const restMsg=restDays===0?'오늘 운동함':restDays+'일째 쉬는 중';

  document.getElementById('page-exercise').innerHTML=`
    <div class="section">
      <div class="spacer"></div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <div class="card-title" style="margin:0;">이번 주 운동</div>
          <div style="font-size:12px;font-weight:700;color:${restColor};">${restMsg}</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <div style="font-size:13px;font-weight:700;color:${weekCount>=weekTarget?'var(--green)':'var(--text)'};">${weekCount} / ${weekTarget}회</div>
          <div style="font-size:11px;color:var(--muted);">${weekPct}%</div>
        </div>
        <div class="goal-bar-bg"><div class="goal-bar-fill" style="width:${weekPct}%;background:${weekCount>=weekTarget?'linear-gradient(90deg,var(--green),var(--accent))':weekCount>0?'linear-gradient(90deg,var(--orange),var(--yellow))':'var(--red)'}"></div></div>
      </div>

      <a href="/workout-session.html" style="display:block;text-align:center;padding:18px;background:var(--accent);color:#000;font-size:16px;font-weight:900;border-radius:14px;text-decoration:none;margin-bottom:16px;letter-spacing:1px;">▶ 운동 시작</a>

      <div class="date-nav">
        <button onclick="moveExDate(-1)">◀</button>
        <div class="date-text">${fmtDateFull(exDate)}</div>
        <button onclick="moveExDate(1)">▶</button>
      </div>
      ${exDetailHtml}
      ${recs.length===0?lastExHtml:''}

      <div class="spacer"></div>
      <div class="section-title">운동 가이드</div>
      <div class="tab-bar" style="margin-bottom:10px;">
        <button class="tab-btn ${exGuideTab==='machine'?'active':''}" onclick="exGuideTab='machine';renderExercise(DATA)">머신 ${groups.machine.length}종</button>
        <button class="tab-btn ${exGuideTab==='bodyweight'?'active':''}" onclick="exGuideTab='bodyweight';renderExercise(DATA)">맨몸 ${groups.bodyweight.length}종</button>
        <button class="tab-btn ${exGuideTab==='cardio'?'active':''}" onclick="exGuideTab='cardio';renderExercise(DATA)">유산소 ${groups.cardio.length}종</button>
      </div>
      <div id="exGuideContent">${renderGuideGroup(groups[exGuideTab]||[])}</div>
    </div>`;
}

function showBodyChart(name,btn){
  ['fatpct','composition','bmi','bmr'].forEach(n=>{
    const el=document.getElementById('bodyChart-'+n);
    if(el) el.style.display=(n===name)?'block':'none';
  });
  if(btn){
    btn.parentElement.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
}

function renderBodyCharts(ir){
  const labels=ir.map(r=>fmtDate(r.date));
  const chartOpts=(min,max,unit)=>({
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1a26',borderColor:'#22223a',borderWidth:1,bodyColor:'#eee',callbacks:{label:ctx=>ctx.parsed.y+unit}}},
    scales:{x:{ticks:{color:'#555',font:{size:10}},grid:{color:'rgba(255,255,255,0.03)'}},y:{min,max,ticks:{color:'#555',font:{size:10},callback:v=>v+unit},grid:{color:'rgba(255,255,255,0.05)'}}}
  });

  // 체지방률
  const fpCanvas=document.getElementById('fatpctChart');
  if(fpCanvas){
    new Chart(fpCanvas,{type:'line',data:{labels,datasets:[
      {label:'체지방률',data:ir.map(r=>r.fat_pct),borderColor:'#ff8c00',backgroundColor:'rgba(255,140,0,0.08)',pointBackgroundColor:'#ff8c00',pointRadius:5,borderWidth:2,tension:0.3,fill:true},
      {label:'목표',data:ir.map(()=>25),borderColor:'rgba(0,255,136,0.3)',borderDash:[3,3],borderWidth:1,pointRadius:0,fill:false}
    ]},options:chartOpts(20,Math.max(...ir.map(r=>r.fat_pct))+3,'%')});
  }

  // 근육 vs 지방
  const compCanvas=document.getElementById('compositionChart');
  if(compCanvas){
    new Chart(compCanvas,{type:'bar',data:{labels,datasets:[
      {label:'골격근',data:ir.map(r=>r.muscle_kg),backgroundColor:'rgba(0,229,255,0.7)',borderRadius:6},
      {label:'체지방',data:ir.map(r=>r.fat_kg),backgroundColor:'rgba(255,68,102,0.7)',borderRadius:6}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#888',font:{size:10}}}},scales:{x:{ticks:{color:'#555'},grid:{color:'rgba(255,255,255,0.03)'}},y:{ticks:{color:'#555',callback:v=>v+'kg'},grid:{color:'rgba(255,255,255,0.05)'}}}}});
  }

  // BMI
  const bmiCanvas=document.getElementById('bmiChart');
  if(bmiCanvas){
    new Chart(bmiCanvas,{type:'line',data:{labels,datasets:[
      {label:'BMI',data:ir.map(r=>r.bmi),borderColor:'#b47fff',backgroundColor:'rgba(180,127,255,0.08)',pointBackgroundColor:'#b47fff',pointRadius:5,borderWidth:2,tension:0.3,fill:true},
      {label:'비만기준',data:ir.map(()=>25),borderColor:'rgba(255,68,102,0.3)',borderDash:[3,3],borderWidth:1,pointRadius:0,fill:false}
    ]},options:chartOpts(20,Math.max(...ir.map(r=>r.bmi))+3,'')});
  }

  // 기초대사량
  const bmrCanvas=document.getElementById('bmrChart');
  if(bmrCanvas){
    new Chart(bmrCanvas,{type:'line',data:{labels,datasets:[
      {label:'기초대사량',data:ir.map(r=>r.bmr_kcal),borderColor:'#00e5ff',backgroundColor:'rgba(0,229,255,0.08)',pointBackgroundColor:'#00e5ff',pointRadius:5,borderWidth:2,tension:0.3,fill:true}
    ]},options:chartOpts(Math.min(...ir.map(r=>r.bmr_kcal))-100,Math.max(...ir.map(r=>r.bmr_kcal))+100,'kcal')});
  }
}

function showInbodyDetail(date){

  const idx=ir.indexOf(r);
  const prev=idx>0?ir[idx-1]:null;
  const items=[
    {label:'골격근',val:r.muscle_kg,unit:'kg',change:r.muscle_change_kg,good:'up'},
    {label:'체지방',val:r.fat_kg,unit:'kg',change:r.fat_change_kg,good:'down'},
    {label:'체지방률',val:r.fat_pct,unit:'%',change:prev?(r.fat_pct-prev.fat_pct).toFixed(1):null,good:'down'},
    {label:'BMI',val:r.bmi,unit:'',change:prev?(r.bmi-prev.bmi).toFixed(1):null,good:'down'},
    {label:'기초대사',val:r.bmr_kcal,unit:'kcal',change:prev?(r.bmr_kcal-prev.bmr_kcal):null,good:'up'},
    {label:'인바디점수',val:r.inbody_score,unit:'점',change:prev?(r.inbody_score-prev.inbody_score):null,good:'up'},
  ];
  const container=document.getElementById('inbodyContainer');
  container.innerHTML=`<div class="card" style="border-color:var(--accent);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div style="font-size:13px;font-weight:700;">📋 ${r.date} (D+${r.day_since_start})</div>
      <div style="font-size:16px;font-weight:900;color:var(--green);">${r.weight_kg}kg</div>
    </div>
    ${r.weight_change_kg!==null?'<div style="font-size:11px;color:var(--green);margin-bottom:8px;">전 측정 대비 '+r.weight_change_kg+'kg</div>':'<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">첫 측정</div>'}
    <div class="grid2" style="margin-bottom:0;">${items.map(i=>'<div class="mini-card"><div class="mini-label">'+i.label+'</div><div class="mini-val">'+i.val+'<span class="mini-unit">'+i.unit+'</span></div>'+(i.change!==null?changeHtml(parseFloat(i.change),i.unit,i.good):'')+'</div>').join('')}</div>
    ${r.memo?'<div style="font-size:11px;color:var(--muted);margin-top:8px;">'+r.memo+'</div>':''}

function toggleExGuide(el){

}

function getExLastRecord(data,exId){
  const recs=(data.exercise_records||[]).slice().reverse();
  for(const r of recs){
    const ex=(r.exercises||[]).find(e=>e.id===exId);
    if(ex) return ex;
  }
  return null;
}

async function deleteExRecord(date,startTime){
  if(!confirm('이 운동 기록을 삭제할까요?')) return;
  await fetch('/api/exercise',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({date,start_time:startTime})});
  const res=await fetch('/api/data');
  DATA=await res.json();
  renderExercise(DATA);
  renderHome(DATA);
}

function moveExDate(dir){
  const d=new Date(exDate);
  d.setDate(d.getDate()+dir);
  const today=new Date().toISOString().slice(0,10);
  if(d.toISOString().slice(0,10)>today) return;
  exDate=d.toISOString().slice(0,10);
  renderExercise(DATA);
}

// ===== 달력 =====
let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();

function renderCalendar(data){
  const today=new Date().toISOString().slice(0,10);

  // 이벤트 수집: 스케줄 + 투약 기록 + 식단 + 운동 + 인바디
  const events={};
  function addEvent(date,type,label){
    if(!events[date]) events[date]=[];
    events[date].push({type,label});
  }

  (data.schedule||[]).forEach(s=>addEvent(s.date,s.type,s.label));
  (data.medication_records||[]).forEach(r=>addEvent(r.date,'medication','💊 '+r.dose+' 투약 ('+r.change_reason+')'));
  (data.inbody_records||[]).forEach(r=>addEvent(r.date,'inbody','📋 인바디 '+r.weight_kg+'kg'));

  // 식단이 있는 날
  const dietDates=new Set((data.diet_records||[]).filter(r=>r.calories_kcal>0).map(r=>r.date));
  dietDates.forEach(d=>addEvent(d,'diet','🍽️ 식단 기록'));

  // 운동이 있는 날
  const exDates=new Set((data.exercise_records||[]).map(r=>r.date));
  exDates.forEach(d=>addEvent(d,'exercise','💪 운동 기록'));

  // 달력 생성
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const startDow=firstDay.getDay();
  const daysInMonth=lastDay.getDate();
  const monthStr=`${calYear}년 ${calMonth+1}월`;

  const dows=['일','월','화','수','목','금','토'];
  let gridHtml=dows.map((d,i)=>`<div class="cal-dow ${i===0?'sun':''}">${d}</div>`).join('');

  // 이전 달 빈칸
  for(let i=0;i<startDow;i++){
    gridHtml+='<div class="cal-day other"></div>';
  }

  // 날짜
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===today;
    const dow=(startDow+d-1)%7;
    const isSun=dow===0;
    const dayEvents=events[dateStr]||[];

    const dots=dayEvents.length>0?
      '<div class="cal-dots">'+[...new Set(dayEvents.map(e=>e.type))].map(t=>'<div class="cal-dot '+t+'"></div>').join('')+'</div>':'';

    gridHtml+=`<div class="cal-day ${isToday?'today':''} ${isSun?'sun':''}" onclick="showCalDay('${dateStr}')">${d}${dots}</div>`;
  }

  // 선택된 날짜 이벤트
  let selectedHtml='<div style="text-align:center;font-size:12px;color:var(--muted);padding:16px;">날짜를 탭하면 일정이 표시됩니다</div>';

  document.getElementById('page-calendar').innerHTML=`
    <div class="section">
      <div class="spacer"></div>
      <div class="cal-header">
        <button onclick="moveCalMonth(-1)">◀</button>
        <div class="cal-month">${monthStr}</div>
        <button onclick="moveCalMonth(1)">▶</button>
      </div>
      <div class="cal-grid">${gridHtml}</div>
      <div class="cal-events" id="calEvents">${selectedHtml}</div>
      <div class="spacer"></div>
      <div class="section-title">다가오는 일정</div>
      <div id="upcomingEvents"></div>
    </div>`;

  // 다가오는 일정 (오늘 이후)
  const upcoming=Object.entries(events)
    .filter(([date])=>date>=today)
    .sort(([a],[b])=>a.localeCompare(b))
    .slice(0,5);

  const upEl=document.getElementById('upcomingEvents');
  if(upcoming.length===0){
    upEl.innerHTML='<div class="empty">예정된 일정 없음</div>';
  } else {
    upEl.innerHTML=upcoming.map(([date,evts])=>
      evts.map(e=>`<div class="cal-event"><div class="ev-date">${date} (${dows[new Date(date).getDay()]})</div><div>${e.label}</div></div>`).join('')
    ).join('');
  }
}

function moveCalMonth(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar(DATA);
}

function showCalDay(dateStr){
  const events={};
  function addEv(date,type,label){
    if(!events[date]) events[date]=[];
    events[date].push({type,label});
  }
  (DATA.schedule||[]).forEach(s=>addEv(s.date,s.type,s.label));
  (DATA.medication_records||[]).forEach(r=>addEv(r.date,'medication','💊 '+r.dose+' 투약 ('+r.change_reason+')'));
  (DATA.inbody_records||[]).forEach(r=>addEv(r.date,'inbody','📋 인바디 '+r.weight_kg+'kg'));
  const dietRecs=(DATA.diet_records||[]).filter(r=>r.date===dateStr&&r.calories_kcal>0);
  if(dietRecs.length) addEv(dateStr,'diet','🍽️ 식단: '+dietRecs.map(r=>r.food_name).join(', '));
  const exRecs=(DATA.exercise_records||[]).filter(r=>r.date===dateStr);
  if(exRecs.length) addEv(dateStr,'exercise','💪 운동: '+exRecs[0].exercises.map(e=>e.name).join(', '));
  const wr=(DATA.weight_records||[]).find(r=>r.date===dateStr);
  if(wr) addEv(dateStr,'weight','⚖️ 체중: '+wr.weight_kg+'kg');

  const dayEvents=events[dateStr]||[];
  const el=document.getElementById('calEvents');
  const dows=['일','월','화','수','목','금','토'];
  const dow=dows[new Date(dateStr).getDay()];

  if(dayEvents.length===0){
    el.innerHTML=`<div style="text-align:center;font-size:12px;color:var(--muted);padding:12px;">${dateStr} (${dow}) — 일정 없음</div>`;
  } else {
    el.innerHTML=`<div style="font-size:12px;font-weight:700;margin-bottom:8px;">${dateStr} (${dow})</div>`+
      dayEvents.map(e=>`<div class="cal-event"><div>${e.label}</div></div>`).join('');
  }
}

        <span class="summary-chip" style="color:var(--accent)">P ${r.diet_summary.total_protein}g</span>

        <div class="ch-sub">반감기 5일 기준 · 매주 투약 시 누적</div>
        <div class="chart-wrap" style="height:200px;"><canvas id="drugChart"></canvas></div>
      </div>
      <div class="spacer"></div>

      ${dailyHtml||'<div class="empty">리포트 없음</div>'}
      <div class="spacer"></div>
      <div class="section-title">주간 분석</div>

      <div class="spacer"></div>

function renderDrugChart(data){
  const meds=data.medication_records||[];
  if(meds.length===0) return;

  const halfLife=5;
  const decayPerDay=Math.pow(0.5,1/halfLife);
  const startDate=new Date(data.profile.medication_start);
  const today=new Date();
  const totalDays=Math.floor((today-startDate)/86400000)+1;

  // 투약 일정 구성 (날짜→용량 맵)
  const doseMap={};
  meds.forEach(m=>{
    doseMap[m.date]=parseFloat(m.dose);
  });

  // 일별 체내 농도 계산
  const labels=[];
  const concentrations=[];
  let conc=0;

  for(let d=0;d<totalDays+14;d++){
    const date=new Date(startDate);
    date.setDate(date.getDate()+d);
    const dateStr=date.toISOString().slice(0,10);
    const label=fmtDate(dateStr);

    // 매일 감쇠
    conc*=decayPerDay;

    // 투약일이면 용량 추가
    if(doseMap[dateStr]){
      conc+=doseMap[dateStr];
    }

    labels.push(label);
    concentrations.push(parseFloat(conc.toFixed(2)));
  }

  // 오늘 위치
  const todayIdx=totalDays-1;
  const pointColors=concentrations.map((_,i)=>i===todayIdx?'#ff4466':'transparent');
  const pointRadii=concentrations.map((_,i)=>i===todayIdx?6:0);

  // 투약일 표시
  const doseLabels=[];
  for(let d=0;d<totalDays+14;d++){
    const date=new Date(startDate);
    date.setDate(date.getDate()+d);
    const dateStr=date.toISOString().slice(0,10);
    if(doseMap[dateStr]) doseLabels.push({idx:d,dose:doseMap[dateStr]});
  }

  // 5mg 예측선 (4주 후부터)
  const predict5mg=[];
  let conc5=concentrations[todayIdx]||0;
  for(let d=0;d<totalDays+14;d++){
    if(d<=todayIdx){
      predict5mg.push(null);
    } else {
      conc5*=decayPerDay;
      const date=new Date(startDate);
      date.setDate(date.getDate()+d);
      const dow=date.getDay();
      // 매주 투약일 (첫 투약 요일 기준)
      const startDow=startDate.getDay();
      if(dow===startDow) conc5+=5;
      predict5mg.push(parseFloat(conc5.toFixed(2)));
    }
  }

  const canvas=document.getElementById('drugChart');
  if(!canvas) return;

  new Chart(canvas,{
    type:'line',
    data:{labels,datasets:[
      {label:'현재 (2.5mg)',data:concentrations.map((v,i)=>i<=todayIdx?v:null),borderColor:'#00e5ff',backgroundColor:'rgba(0,229,255,0.08)',borderWidth:2,pointBackgroundColor:pointColors,pointRadius:pointRadii,tension:0.3,fill:true,spanGaps:false},
      {label:'예측 (5mg 전환 시)',data:predict5mg,borderColor:'#00ff88',borderDash:[4,3],borderWidth:1.5,pointRadius:0,tension:0.3,fill:false,spanGaps:true},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#888',font:{size:10}}},
        tooltip:{
          backgroundColor:'#1a1a26',borderColor:'#22223a',borderWidth:1,titleColor:'#888',bodyColor:'#eee',
          callbacks:{
            label:ctx=>ctx.dataset.label+': '+ctx.parsed.y+'mg 잔류'
          }
        }
      },
      scales:{
        x:{ticks:{color:'#555',font:{size:9},maxTicksLimit:8},grid:{color:'rgba(255,255,255,0.03)'}},
        y:{min:0,ticks:{color:'#555',font:{size:10},callback:v=>v+'mg'},grid:{color:'rgba(255,255,255,0.05)'}}
      }
    }
  });
}

// ===== 사진 업로드 =====
async function uploadPhoto(input){
  if(!input.files[0]) return;
  const fd=new FormData();
  fd.append('file',input.files[0]);
  const toast=document.getElementById('uploadToast');
  try{
    const res=await fetch('/api/photo',{method:'POST',body:fd});
    const d=await res.json();
    if(d.ok){const icon=d.type==='image'?'📷':'📄';toast.textContent=`${icon} 업로드 완료! ${d.filename}`;toast.style.display='block';toast.style.background='var(--green)';setTimeout(()=>{toast.style.display='none';},2500);}
  }catch(e){toast.textContent='업로드 실패';toast.style.background='var(--red)';toast.style.display='block';setTimeout(()=>{toast.style.display='none';},2500);}
  input.value='';
}
